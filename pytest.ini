[pytest]
asyncio_mode = auto
# Scope default collection to our suite only. Without this, a bare `pytest` from the repo root
# recurses into the vendored OpenJarvis tree + scripts/ (7000+ foreign tests, collection errors)
# and drowns the real signal. Explicit `pytest tests/` already worked; this fixes bare runs/CI.
testpaths = tests
# The suite imports repo-root modules (a2a_fabric, calendar_tool, …). Locally a
# venv .pth file happened to provide the root; CI has no such side channel —
# declare the path explicitly so any pytest anywhere resolves imports the same.
pythonpath = .
