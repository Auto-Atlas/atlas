<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 160" fill="none">
  <defs>
    <linearGradient id="eveAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Listening orb -->
  <circle cx="80" cy="80" r="60" fill="url(#orbGlow)"/>
  <circle cx="80" cy="80" r="54" stroke="url(#eveAccent)" stroke-width="6"/>

  <!-- Voice waveform inside the orb -->
  <g stroke="url(#eveAccent)" stroke-width="8" stroke-linecap="round">
    <line x1="56"  y1="68" x2="56"  y2="92"/>
    <line x1="68"  y1="58" x2="68"  y2="102"/>
    <line x1="80"  y1="50" x2="80"  y2="110"/>
    <line x1="92"  y1="58" x2="92"  y2="102"/>
    <line x1="104" y1="68" x2="104" y2="92"/>
  </g>

  <!-- Wordmark: EVE (custom geometric letterforms) -->
  <g stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- E -->
    <path d="M232 40 L186 40 L186 120 L232 120 M186 80 L220 80" stroke="#F8FAFC"/>
    <!-- V (accent) -->
    <path d="M252 40 L286 120 L320 40" stroke="url(#eveAccent)"/>
    <!-- E -->
    <path d="M384 40 L338 40 L338 120 L384 120 M338 80 L372 80" stroke="#F8FAFC"/>
  </g>
</svg>
